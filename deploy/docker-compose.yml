services:
  web:
    profiles: ["demo", "full"]
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
    ports:
      - "${US_CLAW_WEB_PORT:-4173}:4173"
    depends_on:
      - control-plane

  control-plane:
    profiles: ["demo", "full"]
    build:
      context: ..
      dockerfile: deploy/control-plane.Dockerfile
    ports:
      - "${US_CLAW_CONTROL_PLANE_PORT:-8000}:8000"

  openclaw-bridge:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: deploy/openclaw-bridge.Dockerfile
    environment:
      OPENCLAW_HOME: ${OPENCLAW_HOME:-/root/.openclaw}
      OPENCLAW_WORKSPACE: ${OPENCLAW_WORKSPACE:-/root/.openclaw/workspace}
    ports:
      - "${US_CLAW_BRIDGE_PORT:-8787}:8787"
